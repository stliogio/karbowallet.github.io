<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Karbo Wallet</title>
  <link rel="icon" href="img/icon/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="img/icon/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="img/icon/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="img/icon/apple-touch-icon.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="main.css">
</head>
<body>
  
  <div id="preloader">
      <img src="img/logo%20StlioGio.png" alt="StlioGio Logo" id="loaderLogo">
  </div>

  <div class="container-fluid">
    <div class="d-flex justify-content-center">
     <div class="main-container">
      <section class="d-flex" id="wallet" style="flex-direction: column">
            <div class="container">
             <div class="header">
                <div class="username d-flex justify-content-between">
                  <span class="d-flex"><i class="fa-solid fa-user-circle"></i> <span id="wallet-email" style="font-size: large;" class="ms-2 mt-2">Ви</span></span>
                  <div class="d-flex">
                      <a href="settings.html"><i class="fa-solid fa-gear fs-3 settings me-2"></i></a>
                      <a href="index.html"><i class="fa-solid fs-3 fa-right-from-bracket"></i></a>
                  </div>
                </div>
            </div>
              <div class="text-center d-flex justify-content-start">
                  <a class="text-dark" href="wallet.html"><i class="mt-2 fa-solid fa-angle-left me-3 fs-2"></i></a>
                  <img src="img/logo.jpg" class="rounded me-2" width="50px" height="50px" alt="logo">
                  <div class="title fs-2">Karbo Crypto Wallet</div>
              </div>
              <div class="adress">
                <span class="title">Адрес Гаманця:</span>
                <p id="adress" class="text-break"><span class="fw-bold" id="wallet-adress">Твій Гаманець</span><i id="copy-icon" class="fa-regular fa-copy ms-2"></i></p>
              </div>
              <div class="container">
                <h5 class="title mb-1 text-center">Karbo Акаунт</h5>
                <label class="text-secondary" for="ChangePassword">Змінити пароль:</label>
                <input class="form-control" id="ChangePassword" type="password" placeholder="Новий пароль">
                <label class="text-secondary mt-2" for="RepeatPassword">Повторіть пароль:</label>
                <input class="form-control" id="RepeatPassword" type="password" placeholder="Повторіть пароль">
                <div class="d-flex justify-content-center mt-3"><button class="btn btn-dark btn-save">Зберегти</button></div>
                <div id="message-box" class="container p-3 mt-3 d-none">
                    
                </div>
              </div>
              <div class="container mt-3">
                 <h5 class="title mb-1 text-center">Оплати</h5>
                 <div class="container input-payment-id text-break text-center">Згенеруйте Payment ID</div>
                 <div class="d-flex justify-content-center">
                      <button class="btn btn-dark me-3 btn-paymentId mt-3">Згенерувати Payment ID</button>
                  </div>
              </div>
            </div>
      </section>
     </div>
  </div>
  </div>
  <script src="settings.js"></script>
</body>
</html>
