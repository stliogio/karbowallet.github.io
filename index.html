<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Karbo Вхід</title>
  <link rel="icon" href="img/icon/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="img/icon/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="img/icon/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="img/icon/apple-touch-icon.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="main.css">
  <script src="https://code.jquery.com/jquery-4.0.0.min.js" integrity="sha256-OaVG6prZf4v69dPg6PhVattBXkcOWQB62pdZ3ORyrao=" crossorigin="anonymous"></script>
  <script src="login.js"></script>
</head>
<body>

  <div class="container-fluid mt-3">
    <div class="d-flex justify-content-center">
     <div class="main-container" style="width: 700px;">
      <section id="wallet">
        <div class="d-flex login-form">
            <div class="container">
            <div class="text-center d-flex justify-content-center">
                <img src="img/logo.jpg" class="rounded me-2" width="50px" height="50px" alt="logo">
                <span class="title fs-2 text-nowrap">Karbo Crypto Wallet</span>
            </div>
            <div class="login-form">
               <div class="d-flex justify-content-center">
                   <span class="title mt-1 mb-3">Вхід</span>
               </div>
                <label for="email-input" class="text-secondary">Email:</label>
                <input id="email-input" type="email" class="form-control" placeholder="Email">
                <label for="password-input" class="text-secondary mt-1">Пароль:</label>
                <input id="password-input" type="password" class="form-control" placeholder="Пароль">
                <div class="d-flex justify-content-center flex-column mt-3 align-items-center">
                    <button id="login-btn" class="btn btn-dark btn-login">Увійти</button>
                    <a href="register.html"><button class="btn btn-dark btn-register mt-2">Створити гаманець</button></a>
                </div>
                <div class="message-box mt-2 text-center text-danger">
                    
                </div>
            </div>
        </div>
        </div>
      </section>
     </div>
    </div>
  </div>
</body>
</html>
