<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Karbo Вхід</title>
  <link rel="icon" href="img/icon/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="img/icon/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="img/icon/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="img/icon/apple-touch-icon.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="main.css">
</head>
<body>

  <div class="container-fluid">
    <div class="d-flex justify-content-center">
     <div class="main-container" style="width: 700px;">
      <section id="wallet">
        <div class="d-flex login-form">
            <div class="container">
            <div class="text-center d-flex justify-content-center">
                <img src="img/logo.jpg" class="rounded me-2" width="50px" height="50px" alt="logo">
                <span class="title fs-2 text-nowrap">Karbo Crypto Wallet</span>
            </div>
            <div class="login-form">
               <div class="d-flex justify-content-center">
                   <span class="title mt-1 mb-3">Створити Гаманець</span>
               </div>
                <label for="nick" class="text-secondary">Ім'я користувача:</label>
                <input id="nick" type="text" class="form-control" placeholder="Nick Name">
                <label for="email" class="text-secondary">Email:</label>
                <input id="email" type="email" class="form-control" placeholder="Email">
                <label for="password" class="text-secondary mt-1">Пароль:</label>
                <input id="password" type="password" class="form-control" placeholder="Пароль">
                <label for="repeatPassword" class="text-secondary mt-1">Повторити пароль:</label>
                <input id="repeatPassword" type="password" class="form-control" placeholder="Пароль">
                <div class="d-flex justify-content-center flex-column mt-3 align-items-center">
                    <button id="register-btn" class="btn btn-dark btn-login">Створити</button>
                    <a href="index.html"><button style="width: 52px;" class="btn btn-dark btn-register mt-2"><i class="fa-solid fa-right-from-bracket"></i></button></a>
                </div>
                <div id="message-box" class="mt-3 text-center">
                    
                </div>
            </div>
        </div>
        </div>
      </section>
     </div>
    </div>
  </div>
  <script src="register.js"></script>
</body>
</html>
